<!DOCTYPE html>
<html>
    <head>
        <title>Temperature</title>
        <meta name="description" content="Temperature information page">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="temperature">
        <!-- 
        Create a HTML page displaying the temperature with
         - a title
         - a paragraph (with an id for temperature data)
         - a toggle button for Fahrenheit and Celsius
         - space for a thermometer icon
         -->
        <h1>Temperature</h1>        
        <p id="temperature"></p>
        <button id="toggle-button" onclick="toggleTemperature()">Toggle Fahrenheit/Celsius</button>
        <div id="thermometer"></div>
        
        <script src="../script.js" async defer></script>
    </body>
</html>
